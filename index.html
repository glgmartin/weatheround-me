<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Local Weather App</title>
        <link 
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />

        <style>
            html, body {
                margin: 0;
                padding: 0;
                height: 100%;
            }

            #map {
                height: 100%;
                width: 100%;
            }

            #error-message {
                display: none;
                position: absolute;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 1000;
                background: rgba(200, 0, 0, 0.85);
                color: white;
                padding: 12px 20px;
                border-radius: 8px;
                font-family: sans-serif;
                font-size: 14px;
                text-align: center;
                max-width: 80%;
            }
        </style>

    </head>

    <body>
        <div id="map"></div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        
        <script>
            const map = L.map('map').setView([48.85, 2.35], 6);
            
            L.tileLayer(
                'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
                {
                    maxZoom: 19,
                    attribution: '© OpenStreetMap contributors'
                }
                ).addTo(map);

            function getCurrentHourString() {
                const now = new Date();
                const pad = n => String(n).padStart(2, '0');
                return now.getFullYear() + '-' +
                    pad(now.getMonth() + 1) + '-' +
                    pad(now.getDate()) + 'T' +
                    pad(now.getHours()) + ':00';
            }

            async function fetchWeather(lat, lon) {
                const url = 
                    'https://api.open-meteo.com/v1/forecast' +
                    '?latitude=' + lat +
                    '&longitude=' + lon +
                    '&hourly=temperature_2m' +
                    '&models=meteofrance_arome_france' +
                    '&timezone=auto' +
                    '&forecast_days=2';

                try {
                    const response = await fetch(url);
                    const data = await response.json();

                    const currentHour = getCurrentHourString();
                    const startIndex = data.hourly.time.findIndex(
                        t => t >= currentHour
                    );

                    const times = data.hourly.time.slice(startIndex, startIndex + 24);
                    const temperatures = data.hourly.temperature_2m.slice(startIndex, startIndex + 24);

                    console.log('Current hour:', currentHour);
                    console.log('Start index:', startIndex);
                    console.log('Times:', times);
                    console.log('Temperatures:', temperatures);

                } catch (error) {
                    console.log('Weather fetch error: ' + error.message);
                }
            }

            function onGpsSuccess(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                map.setView([lat, lon], 11);
                L.marker([lat, lon]).addTo(map);
                fetchWeather(lat, lon);
            }

            function onGpsError(error) {
                const msg = document.getElementById('error-message');
                msg.style.display = 'block';
                console.log('GPS Error: ' + error.message);
            }

            navigator.geolocation.getCurrentPosition(
                onGpsSuccess, onGpsError
            );
        </script>

        <div id="error-message">
            Location access is disabled. Please enable it.
        </div>
        
    </body>
</html>
