<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Local Weather App</title>
        <link 
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />

        <style>
            html, body {
                height: 100%;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }

            #map {
                flex: 1;
                min-height: 0;
            }

            #bottom-bar {
                flex-shrink: 0;
            }

            #time-slider {
                flex: 1;
                accent-color: #7eb8f7;
                cursor: pointer;
            }

            .mode-tab.active {
                background: rgba(255, 255, 255, 0.3);
                font-weight: bold;
            }

            .mode-tab {
                transition: background 0.15s;
            }

            #error-message {
                display: none;
                position: absolute;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 1000;
                background: rgba(200, 0, 0, 0.85);
                color: white;
                padding: 12px 20px;
                border-radius: 8px;
                font-family: sans-serif;
                font-size: 14px;
                text-align: center;
                max-width: 80%;
            }

            #info-card {
                display: none;
                position: absolute;
                top: 16px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 1000;
                background: rgba(20, 20, 40, 0.85);
                color: white;
                padding: 12px 24px;
                border-radius: 12px;
                font-family: sans-serif;
                text-align: center;
                min-width: 180px;
            }

            #info-card .label {
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 1px;
                opacity: 0.7;
                margin-bottom: 2px;
            }

            #info-card .value {
                font-size: 28px;
                font-weight: bold;
                line-height: 1.1;
            }

            #info-card .secondary {
                font-size: 12px;
                opacity: 0.7;
                margin-top: 4px;
            }

            #info-card .anomaly-warm {
                font-size: 12px;
                margin-top: 4px;
                color: #ff9966;
            }

            #info-card .anomaly-cold {
                font-size: 12px;
                margin-top: 4px;
                color: #99ccff;
            }
        </style>

    </head>

    <body>
        <div id="map"></div>

        <div id="error-message">
            Location access is disabled. Please enable it.
        </div>

        <div id="info-card">
            <div class="label" id="card-label">Temperature</div>
            <div class="value" id="card-value">--</div>
            <div class="secondary" id="card-time">--:--</div>
            <div class="secondary" id="temp-normal">Normal: loading...</div>
            <div id="temp-anomaly"></div>
        </div>

        <div id="bottom-bar">
            <div id="time-row">
                <button id="now-button">Now</button>
                <input type="range" id="time-slider" min="0" max="23" value="0" step="1">
                <div id="time-label">Now</div>
            </div>
            <div id="mode-tabs">
                <button class="mode-tab active" data-mode="temperature">🌡 Temp</button>
                <button class="mode-tab" data-mode="cloud">☁️ Cloud</button>
                <button class="mode-tab" data-mode="rain">🌧 Rain</button>
                <button class="mode-tab" data-mode="thunder">⚡ Storm</button>
            </div>
        </div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        
        <script>
            const map = L.map('map').setView([48.85, 2.35], 6);
            
            L.tileLayer(
                'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
                {
                    maxZoom: 19,
                    attribution: '© OpenStreetMap contributors'
                }
                ).addTo(map);
            
            let weatherData = {};
            let currentMode = 'temperature';
            let currentIndex = 0;

            function getCurrentHourString() {
                const now = new Date();
                const pad = n => String(n).padStart(2, '0');
                return now.getFullYear() + '-' +
                    pad(now.getMonth() + 1) + '-' +
                    pad(now.getDate()) + 'T' +
                    pad(now.getHours()) + ':00';
            }

            function formatDate(date) {
                const pad = n => String(n).padStart(2, '0');
                return date.getFullYear() + '-' +
                    pad(date.getMonth() + 1) + '-' +
                    pad(date.getDate());
            }

            function formatTimeLabel(timeStr) {
                const date = new Date(timeStr);
                const today = new Date();
                const tomorrow = new Date(today);
                tomorrow.setDate(today.getDate() + 1);

                const isToday = date.getDate() === today.getDate() &&
                                date.getMonth() === today.getMonth();

                const isTomorrow = date.getDate() === tomorrow.getDate() &&
                                    date.getMonth() === tomorrow.getMonth();

                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                const time = hours + ':' + minutes;

                if (isToday) return 'Today ' + time;
                if (isTomorrow) return 'Tomorrow ' + time;
                return timeStr.split('T')[0] + ' ' + time;
            }

            function calculateAverage(values) {
                const valid = values.filter(v => v !== null && v !== undefined);
                if (valid.length === 0) return null;
                const sum = valid.reduce((acc, val) => acc + val, 0);
                return Math.round(sum / valid.length);
            }

            function updateInfoCard() {
                if (!weatherData.temperatures) return;

                const card = document.getElementById('info-card');
                const cardLabel = document.getElementById('card-label');
                const cardValue = document.getElementById('card-value');
                const cardTime = document.getElementById('card-time');
                const tempNormal = document.getElementById('temp-normal');
                const tempAnomaly = document.getElementById('temp-anomaly');

                cardTime.textContent = formatTimeLabel(weatherData.times[currentIndex]);

                if (currentMode == 'temperature') {
                    cardLabel.textContent = 'Temperature';
                    cardValue.textContent = Math.round(weatherData.temperatures[currentIndex]) + '°C';

                    if (weatherData.historicalNormal !== undefined) {
                        const todayAvg = calculateAverage(weatherData.temperatures);
                        tempNormal.textContent = 'Normal for today: ' + weatherData.historicalNormal + '°C';
                        
                        const diff = todayAvg - weatherData.historicalNormal;
                        const sign = diff > 0 ? '+' : '';
                        const absDiff = Math.abs(diff);

                        if (absDiff < 1) {
                            tempAnomaly.className = 'secondary';
                            tempAnomaly.textContent = 'Near normal';
                        } else if (diff > 0) {
                            tempAnomaly.className = 'anomaly-warm';
                            tempAnomaly.textContent = sign + diff + '°C warmer than usual';
                        } else {
                            tempAnomaly.className = 'anomaly-cold';
                            tempAnomaly.textContent = diff + '°C cooler than usual';
                        }
                    } else {
                        tempNormal.textContent = 'Normal: loading...';
                        tempAnomaly.textContent = '';
                    }
                } else {
                    cardLabel.textContent = currentMode.charAt(0).toUpperCase() + currentMode.slice(1);
                    cardValue.textContent = '–';
                    tempNormal.textContent = 'Data coming soon';
                    tempAnomaly.textContent = '';
                }

                card.style.display = 'block';
            }

            const slider = document.getElementById('time-slider');
            const timeLabel = document.getElementById('time-label');

            slider.addEventListener('input', function() {
                currentIndex = parseInt(this.value);
                timeLabel.textContent = currentIndex === 0 ? 'Now' : '+' + currentIndex + 'h';
                updateInfoCard();
            });

            document.getElementById('now-button').addEventListener('click', function() {
                slider.value = 0;
                currentIndex = 0;
                timeLabel.textContent = 'Now';
                updateInfoCard();
            });

            const tabs = document.querySelectorAll('.mode-tab');
            tabs.forEach(function(tab) {
                tab.addEventListener('click', function() {
                    tabs.forEach(function(t) { t.classList.remove('active'); });
                    this.classList.add('active');
                    currentMode = this.dataset.mode;
                    updateInfoCard();
                });
            });

            async function fetchWeather(lat, lon) {
                const url = 
                    'https://api.open-meteo.com/v1/forecast' +
                    '?latitude=' + lat +
                    '&longitude=' + lon +
                    '&hourly=temperature_2m' +
                    '&models=meteofrance_arome_france' +
                    '&timezone=auto' +
                    '&forecast_days=2';

                try {
                    const response = await fetch(url);
                    const data = await response.json();

                    const currentHour = getCurrentHourString();
                    const startIndex = data.hourly.time.findIndex(
                        t => t >= currentHour
                    );

                    weatherData.times = data.hourly.time.slice(startIndex, startIndex + 24);
                    weatherData.temperatures = data.hourly.temperature_2m.slice(startIndex, startIndex + 24);

                    updateInfoCard();

                } catch (error) {
                    console.log('Weather fetch error: ' + error.message);
                }
            }

            async function fetchHistoricalNormal(lat, lon) {
                const today = new Date();

                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);

                const tenYearsAgo = new Date(today);
                tenYearsAgo.setFullYear(tenYearsAgo.getFullYear() - 10);

                const url =
                    'https://archive-api.open-meteo.com/v1/archive' +
                    '?latitude=' + lat +
                    '&longitude=' + lon +
                    '&start_date=' + formatDate(tenYearsAgo) +
                    '&end_date=' + formatDate(yesterday) +
                    '&daily=temperature_2m_mean' +
                    '&timezone=auto';

                try {
                    const response = await fetch(url);
                    const data = await response.json();

                    const currentMonth = today.getMonth() + 1;
                    const currentDay = today.getDate();

                    const matchingTemps = data.daily.time
                    .map((dateStr, index) => ({ dateStr, index }))
                    .filter(({ dateStr }) => {
                        const parts = dateStr.split('-');
                        return parseInt(parts[1]) === currentMonth &&
                            parseInt(parts[2]) === currentDay;
                    })
                    .map(({ index }) => data.daily.temperature_2m_mean[index])
                    .filter(val => val !== null);

                    weatherData.historicalNormal = calculateAverage(matchingTemps);

                    updateInfoCard();

                } catch (error) {
                    console.log('Historical fetch error: ' + error.message);
                }
            }


            function onGpsSuccess(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                map.setView([lat, lon], 11);
                L.marker([lat, lon]).addTo(map);

                fetchWeather(lat, lon);
                fetchHistoricalNormal(lat, lon);
            }

            function onGpsError(error) {
                const msg = document.getElementById('error-message');
                msg.style.display = 'block';
                console.log('GPS Error: ' + error.message);
            }

            navigator.geolocation.getCurrentPosition(
                onGpsSuccess, onGpsError
            );
        </script>

        
        
    </body>
</html>
